# Board-specific config for the LVGL sample on GD32F527I-EVAL.
# Enables the bit-banged SPI bus and the XPT2046 resistive touch driver.

# Bit-banged SPI controller (GPIO-based) for the XPT2046 touch IC
CONFIG_SPI_BITBANG=y

# XPT2046 touch input driver
CONFIG_INPUT_XPT2046=y

# Pipe XPT2046 input events into LVGL as a pointer device
CONFIG_LV_Z_POINTER_INPUT=y

# Input subsystem (required for touch)
CONFIG_INPUT=y
