description: GigaDevice GD32 I2C version 3

compatible: "gd,gd32-i2c-v3"

include: [i2c-controller.yaml, reset-device.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  resets:
    required: true

  clocks:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  dmas:
    type: phandle-array
    description: |
      Optional DMA channels used by the I2C peripheral. If specified, these
      channels can be used to handle RX and TX transactions over DMA.

  dma-names:
    type: string-array
    description: |
      Names of the optional DMA channels. Expected values are "rx" for
      the RX channel and "tx" for the TX channel.
