# Legacy USB device stack + GD32 USBHS0 (FS) controller driver
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_DC_GD32=y

CONFIG_USB_DEVICE_PRODUCT="GD32 CDC ACM"
CONFIG_USB_DEVICE_PID=0x018A
CONFIG_USB_DEVICE_VID=0x28E9

CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

CONFIG_STDOUT_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

CONFIG_LOG=y
CONFIG_USB_DRIVER_LOG_LEVEL_INF=y
CONFIG_USB_DEVICE_LOG_LEVEL_INF=y

CONFIG_USB_CDC_ACM_LOG_LEVEL_ERR=y
