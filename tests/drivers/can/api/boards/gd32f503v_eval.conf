# GD32F503's Cortex-M33 implements only 4 MPU regions (MPU_TYPE.DREGION = 4).
# That is not enough to map the per-thread stack plus the ztest/libc memory
# domain partitions required by Zephyr userspace, so enabling user mode for the
# ZTEST_USER cases exhausts the dynamic MPU region slots at boot
# ("no free partition slots available") and the first user-mode test faults
# with an MPU data access violation when touching can_dev.
#
# The CAN controller API is fully exercised in supervisor mode, so run the
# ZTEST_USER cases in supervisor mode on this board by not enabling userspace.

CONFIG_TEST_USERSPACE=n
CONFIG_CAN_RX_TIMESTAMP=n
CONFIG_PM_DEVICE=n
