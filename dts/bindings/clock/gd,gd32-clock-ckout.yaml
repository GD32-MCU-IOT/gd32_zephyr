compatible: "gd,gd32-clock-ckout"

description: |
  GigaDevice GD32 CKOUT clock output.

  This node models a SoC clock-output resource (for example CK_OUT0).
  It configures the source multiplexer and output divider used to route
  an internal clock to the CK_OUT pin.

  Example:

    &ckout0 {
        clocks = <&cctl GD32_CKOUT0SRC_PLLP>;
        clock-names = "clksel";
        prescaler = <GD32_CKOUT0_DIV4>;
        pinctrl-0 = <&ckout0_default>;
        pinctrl-names = "default";
        status = "okay";
    };

include: [base.yaml, pinctrl-device.yaml]

properties:
  clocks:
    required: true
    description: |
      CKOUT source selector. Use one GD32_CKOUT0SRC_* macro from the
      SoC-specific dt-bindings clock header.

  clock-names:
    enum: ["clksel"]
    required: true

  prescaler:
    type: int
    required: true
    description: |
      CKOUT output divider. Use one GD32_CKOUT0_DIV* macro from the
      SoC-specific dt-bindings clock header.

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true
