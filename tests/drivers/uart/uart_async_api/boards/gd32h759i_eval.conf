# GD32H759 has Cortex-M7 with D-Cache enabled by default.
# Use the DT-defined NOCACHE memory region to ensure DMA buffers are
# placed in non-cacheable SRAM so DMA and CPU observe a coherent view.

CONFIG_DT_DEFINED_NOCACHE=y
CONFIG_DT_DEFINED_NOCACHE_NAME="RAM_NOCACHE"
CONFIG_CACHE_MANAGEMENT=y

CONFIG_TEST_USERSPACE=n
CONFIG_USERSPACE=n
